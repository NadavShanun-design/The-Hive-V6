<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Asteroids</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
canvas { display: block; border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width = 800;
const H = canvas.height = 600;

const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

let ship, asteroids, bullets, particles, score, lives, level, gameOver, started;

function init() {
  ship = { x: W/2, y: H/2, vx: 0, vy: 0, angle: -Math.PI/2, radius: 12, invincible: 180, dead: false };
  asteroids = [];
  bullets = [];
  particles = [];
  score = 0;
  lives = 3;
  level = 1;
  gameOver = false;
  started = false;
  spawnAsteroids(4);
}

function spawnAsteroids(n) {
  for (let i = 0; i < n; i++) {
    let x, y;
    do {
      x = Math.random() * W;
      y = Math.random() * H;
    } while (dist(x, y, W/2, H/2) < 150);
    asteroids.push(makeAsteroid(x, y, 3));
  }
}

function makeAsteroid(x, y, size) {
  const speed = (0.5 + Math.random() * 1.5) * (4 - size);
  const angle = Math.random() * Math.PI * 2;
  const radius = size === 3 ? 40 : size === 2 ? 22 : 12;
  const pts = [];
  const n = 8 + Math.floor(Math.random() * 5);
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const r = radius * (0.7 + Math.random() * 0.5);
    pts.push([Math.cos(a) * r, Math.sin(a) * r]);
  }
  return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, radius, size, pts, rot: 0, rotSpeed: (Math.random() - 0.5) * 0.05 };
}

function dist(x1, y1, x2, y2) {
  return Math.hypot(x2 - x1, y2 - y1);
}

function wrap(obj) {
  if (obj.x < 0) obj.x += W;
  if (obj.x > W) obj.x -= W;
  if (obj.y < 0) obj.y += H;
  if (obj.y > H) obj.y -= H;
}

function spawnParticles(x, y, n, color) {
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 40 + Math.random() * 30, color: color || '#fff' });
  }
}

let shootCooldown = 0;
let lastTime = 0;

function update(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  if (!started) {
    requestAnimationFrame(update);
    drawMenu();
    return;
  }

  if (gameOver) {
    requestAnimationFrame(update);
    drawGameOver();
    return;
  }

  // Ship controls
  if (!ship.dead) {
    if (keys['ArrowLeft']) ship.angle -= 0.05 * dt;
    if (keys['ArrowRight']) ship.angle += 0.05 * dt;
    if (keys['ArrowUp']) {
      ship.vx += Math.cos(ship.angle) * 0.2 * dt;
      ship.vy += Math.sin(ship.angle) * 0.2 * dt;
    }
    ship.vx *= Math.pow(0.99, dt);
    ship.vy *= Math.pow(0.99, dt);
    ship.x += ship.vx * dt;
    ship.y += ship.vy * dt;
    wrap(ship);
    if (ship.invincible > 0) ship.invincible -= dt;

    if (shootCooldown > 0) shootCooldown -= dt;
    if (keys['Space'] && shootCooldown <= 0) {
      bullets.push({ x: ship.x + Math.cos(ship.angle) * 14, y: ship.y + Math.sin(ship.angle) * 14, vx: Math.cos(ship.angle) * 10, vy: Math.sin(ship.angle) * 10, life: 60 });
      shootCooldown = 8;
    }
  } else {
    ship.respawnTimer -= dt;
    if (ship.respawnTimer <= 0) {
      ship.dead = false;
      ship.x = W/2; ship.y = H/2;
      ship.vx = 0; ship.vy = 0;
      ship.invincible = 180;
    }
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    wrap(b);
    b.life -= dt;
    if (b.life <= 0) bullets.splice(i, 1);
  }

  // Asteroids
  for (const a of asteroids) {
    a.x += a.vx * dt;
    a.y += a.vy * dt;
    a.rot += a.rotSpeed * dt;
    wrap(a);
  }

  // Bullet-asteroid collisions
  for (let i = bullets.length - 1; i >= 0; i--) {
    for (let j = asteroids.length - 1; j >= 0; j--) {
      const b = bullets[i];
      const a = asteroids[j];
      if (b && dist(b.x, b.y, a.x, a.y) < a.radius) {
        bullets.splice(i, 1);
        asteroids.splice(j, 1);
        score += a.size === 3 ? 20 : a.size === 2 ? 50 : 100;
        spawnParticles(a.x, a.y, 8, '#fa0');
        if (a.size > 1) {
          asteroids.push(makeAsteroid(a.x, a.y, a.size - 1));
          asteroids.push(makeAsteroid(a.x, a.y, a.size - 1));
        }
        break;
      }
    }
  }

  // Ship-asteroid collision
  if (!ship.dead && ship.invincible <= 0) {
    for (const a of asteroids) {
      if (dist(ship.x, ship.y, a.x, a.y) < a.radius + ship.radius * 0.7) {
        spawnParticles(ship.x, ship.y, 20, '#0af');
        lives--;
        if (lives <= 0) {
          gameOver = true;
        } else {
          ship.dead = true;
          ship.respawnTimer = 90;
        }
        break;
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Next level
  if (asteroids.length === 0) {
    level++;
    spawnAsteroids(3 + level);
  }

  draw();
  requestAnimationFrame(update);
}

function drawShip(x, y, angle, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.globalAlpha = alpha;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(18, 0);
  ctx.lineTo(-12, -10);
  ctx.lineTo(-8, 0);
  ctx.lineTo(-12, 10);
  ctx.closePath();
  ctx.stroke();
  if (keys['ArrowUp']) {
    ctx.strokeStyle = '#f80';
    ctx.beginPath();
    ctx.moveTo(-8, -5);
    ctx.lineTo(-16 - Math.random() * 8, 0);
    ctx.lineTo(-8, 5);
    ctx.stroke();
  }
  ctx.restore();
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Asteroids
  for (const a of asteroids) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(a.pts[0][0], a.pts[0][1]);
    for (let i = 1; i < a.pts.length; i++) ctx.lineTo(a.pts[i][0], a.pts[i][1]);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }

  // Bullets
  ctx.fillStyle = '#ff0';
  for (const b of bullets) {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ship
  if (!ship.dead) {
    const alpha = ship.invincible > 0 ? (Math.floor(ship.invincible / 8) % 2 === 0 ? 0.3 : 1) : 1;
    drawShip(ship.x, ship.y, ship.angle, alpha);
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / 60;
    ctx.globalAlpha = Math.min(alpha, 1);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = '20px monospace';
  ctx.fillText('SCORE: ' + score, 10, 28);
  ctx.fillText('LEVEL: ' + level, W/2 - 50, 28);
  for (let i = 0; i < lives; i++) {
    ctx.save();
    ctx.translate(W - 30 - i * 28, 20);
    ctx.rotate(-Math.PI / 2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(10, 0);
    ctx.lineTo(-6, -6);
    ctx.lineTo(-4, 0);
    ctx.lineTo(-6, 6);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  }
}

function drawMenu() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 64px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ASTEROIDS', W/2, H/2 - 60);
  ctx.font = '24px monospace';
  ctx.fillText('PRESS SPACE TO START', W/2, H/2 + 20);
  ctx.font = '16px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('ARROW KEYS: Rotate/Thrust  |  SPACE: Shoot', W/2, H/2 + 70);
  ctx.textAlign = 'left';
  if (keys['Space']) { started = true; }
}

function drawGameOver() {
  draw();
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 56px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2 - 40);
  ctx.font = '24px monospace';
  ctx.fillText('SCORE: ' + score, W/2, H/2 + 20);
  ctx.font = '18px monospace';
  ctx.fillStyle = '#aaa';
  ctx.fillText('PRESS SPACE TO RESTART', W/2, H/2 + 70);
  ctx.textAlign = 'left';
  if (keys['Space']) { init(); started = true; }
}

init();
requestAnimationFrame(update);
</script>
</body>
</html>
