<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>2048</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #faf8ef; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
h1 { font-size: 60px; font-weight: bold; color: #776e65; }
.header { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }
.score-box { background: #bbada0; border-radius: 6px; padding: 8px 16px; text-align: center; color: white; }
.score-box .label { font-size: 12px; text-transform: uppercase; }
.score-box .val { font-size: 24px; font-weight: bold; }
.msg { font-size: 18px; color: #776e65; margin-bottom: 10px; height: 24px; }
#new-game { background: #8f7a66; color: white; border: none; border-radius: 6px; padding: 10px 20px; font-size: 16px; font-weight: bold; cursor: pointer; }
#new-game:hover { background: #9f8b77; }
.grid { background: #bbada0; border-radius: 8px; padding: 8px; display: grid; grid-template-columns: repeat(4, 100px); grid-template-rows: repeat(4, 100px); gap: 8px; }
.cell { background: rgba(238,228,218,0.35); border-radius: 4px; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; }
.t2    { background: #eee4da; color: #776e65; }
.t4    { background: #ede0c8; color: #776e65; }
.t8    { background: #f2b179; color: white; }
.t16   { background: #f59563; color: white; }
.t32   { background: #f67c5f; color: white; }
.t64   { background: #f65e3b; color: white; }
.t128  { background: #edcf72; color: white; font-size: 28px; }
.t256  { background: #edcc61; color: white; font-size: 28px; }
.t512  { background: #edc850; color: white; font-size: 28px; }
.t1024 { background: #edc53f; color: white; font-size: 22px; }
.t2048 { background: #edc22e; color: white; font-size: 22px; }
.thigh { background: #3c3a32; color: white; font-size: 18px; }
</style>
</head>
<body>
<div class="header">
  <h1>2048</h1>
  <div class="score-box"><div class="label">Score</div><div class="val" id="score">0</div></div>
  <div class="score-box"><div class="label">Best</div><div class="val" id="best">0</div></div>
</div>
<div class="msg" id="msg"></div>
<button id="new-game" onclick="init()">New Game</button>
<br>
<div class="grid" id="grid"></div>
<br>
<div style="color:#776e65;font-size:14px">Arrow keys to move &nbsp;|&nbsp; Swipe on mobile</div>

<script>
let board, score, best = 0, won = false, over = false;

function init() {
  board = Array.from({length:4}, () => Array(4).fill(0));
  score = 0; won = false; over = false;
  addTile(); addTile();
  render();
}

function addTile() {
  let empty = [];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!board[r][c]) empty.push([r,c]);
  if(!empty.length) return;
  let [r,c] = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random() < 0.9 ? 2 : 4;
}

function slide(row) {
  let a = row.filter(x=>x), merged = false, pts = 0;
  for(let i=0;i<a.length-1;i++) {
    if(!merged && a[i]===a[i+1]) { a[i]*=2; pts+=a[i]; a.splice(i+1,1); merged=true; }
    else merged=false;
  }
  while(a.length<4) a.push(0);
  return {row:a, pts};
}

function move(dir) {
  if(over) return;
  let changed=false, pts=0;
  let b = board.map(r=>[...r]);

  if(dir==='left') {
    for(let r=0;r<4;r++) { let {row,pts:p}=slide(b[r]); if(b[r].join()!==row.join()) changed=true; b[r]=row; pts+=p; }
  } else if(dir==='right') {
    for(let r=0;r<4;r++) { let {row,pts:p}=slide([...b[r]].reverse()); row.reverse(); if(b[r].join()!==row.join()) changed=true; b[r]=row; pts+=p; }
  } else if(dir==='up') {
    for(let c=0;c<4;c++) { let col=b.map(r=>r[c]); let {row,pts:p}=slide(col); if(col.join()!==row.join()) changed=true; row.forEach((v,r)=>b[r][c]=v); pts+=p; }
  } else if(dir==='down') {
    for(let c=0;c<4;c++) { let col=b.map(r=>r[c]).reverse(); let {row,pts:p}=slide(col); row.reverse(); let orig=b.map(r=>r[c]); if(orig.join()!==row.join()) changed=true; row.forEach((v,r)=>b[r][c]=v); pts+=p; }
  }

  if(!changed) return;
  board = b; score += pts;
  if(score > best) best = score;
  addTile();
  checkWin();
  checkOver();
  render();
}

function checkWin() {
  if(won) return;
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(board[r][c]===2048) won=true;
}

function checkOver() {
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
    if(!board[r][c]) return;
    if(c<3 && board[r][c]===board[r][c+1]) return;
    if(r<3 && board[r][c]===board[r+1][c]) return;
  }
  over = true;
}

function tileClass(v) {
  if(!v) return '';
  if(v<=2048) return 't'+v;
  return 'thigh';
}

function render() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('msg').textContent = won ? '🎉 You reached 2048!' : over ? 'Game over!' : '';
  let g = document.getElementById('grid');
  g.innerHTML = '';
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) {
    let d = document.createElement('div');
    d.className = 'cell ' + tileClass(board[r][c]);
    d.textContent = board[r][c] || '';
    g.appendChild(d);
  }
}

document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft')  { e.preventDefault(); move('left'); }
  if(e.key==='ArrowRight') { e.preventDefault(); move('right'); }
  if(e.key==='ArrowUp')    { e.preventDefault(); move('up'); }
  if(e.key==='ArrowDown')  { e.preventDefault(); move('down'); }
});

// Touch support
let tx, ty;
document.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; });
document.addEventListener('touchend', e=>{
  let dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

init();
</script>
</body>
</html>
