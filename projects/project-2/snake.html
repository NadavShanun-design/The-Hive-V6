<!DOCTYPE html>
<html>
<head>
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #0f0; }
canvas { border: 2px solid #0f0; }
#score { font-size: 24px; margin-bottom: 12px; }
#msg { font-size: 18px; margin-top: 12px; color: #ff0; }
</style>
</head>
<body>
<div id="score">SCORE: 0</div>
<canvas id="c" width="400" height="400"></canvas>
<div id="msg">Press any arrow key to start</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const S = 20, W = 20, H = 20;
let snake, dir, nextDir, food, score, running, interval;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  running = true;
  document.getElementById('score').textContent = 'SCORE: 0';
  document.getElementById('msg').textContent = '';
  placeFood();
  if (interval) clearInterval(interval);
  interval = setInterval(tick, 120);
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*W), y: Math.floor(Math.random()*H)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=W||head.y<0||head.y>=H||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    clearInterval(interval);
    running = false;
    document.getElementById('msg').textContent = 'GAME OVER — Press arrow to restart';
    return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    document.getElementById('score').textContent = 'SCORE: ' + score;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#f00';
  ctx.fillRect(food.x*S+1, food.y*S+1, S-2, S-2);
  snake.forEach((s,i) => {
    ctx.fillStyle = i===0 ? '#0f0' : '#080';
    ctx.fillRect(s.x*S+1, s.y*S+1, S-2, S-2);
  });
}

document.addEventListener('keydown', e => {
  const keys = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if (!keys[e.key]) return;
  e.preventDefault();
  const d = keys[e.key];
  if (!running) { init(); return; }
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
});

draw();
ctx.fillStyle = '#0f0';
ctx.font = '20px monospace';
ctx.textAlign = 'center';
ctx.fillText('SNAKE', canvas.width/2, canvas.height/2);
</script>
</body>
</html>
