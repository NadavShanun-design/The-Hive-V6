<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whack-a-Mole</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a0a00; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Arial Black', sans-serif; user-select: none; }
h1 { color: #ff6b00; font-size: 3rem; text-shadow: 0 0 20px #ff6b00; margin-bottom: 20px; }
#hud { display: flex; gap: 60px; margin-bottom: 30px; }
.stat { text-align: center; }
.stat label { color: #aaa; font-size: 0.9rem; display: block; }
.stat span { color: #fff; font-size: 2.5rem; font-weight: bold; }
#timer { color: #ff4444; }
#grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
.hole { width: 140px; height: 140px; background: #2a1500; border-radius: 50%; border: 4px solid #5a3000; position: relative; overflow: hidden; cursor: pointer; transition: border-color 0.1s; }
.hole:hover { border-color: #ff6b00; }
.hole-inner { position: absolute; bottom: 0; left: 0; right: 0; height: 60%; background: #1a0a00; border-radius: 50% 50% 0 0; }
.mole { position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; background: #8B4513; border-radius: 50% 50% 40% 40%; transition: bottom 0.12s ease-out; cursor: pointer; }
.mole::before { content: ''; position: absolute; top: 15px; left: 10px; width: 18px; height: 18px; background: #fff; border-radius: 50%; box-shadow: 30px 0 0 #fff; }
.mole::after { content: ''; position: absolute; top: 20px; left: 13px; width: 10px; height: 10px; background: #222; border-radius: 50%; box-shadow: 30px 0 0 #222; }
.mole .nose { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); width: 16px; height: 10px; background: #ff69b4; border-radius: 50%; }
.mole.up { bottom: 20px; }
.mole.whacked { background: #ff0000; transform: translateX(-50%) scale(0.8); }
#overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
#overlay h2 { font-size: 3rem; color: #ff6b00; margin-bottom: 20px; }
#overlay p { font-size: 1.5rem; margin-bottom: 30px; }
#overlay button { padding: 15px 50px; font-size: 1.5rem; font-family: inherit; background: #ff6b00; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: transform 0.1s, background 0.1s; }
#overlay button:hover { background: #ff8c00; transform: scale(1.05); }
.hit-text { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #ffff00; font-size: 1.2rem; font-weight: bold; pointer-events: none; animation: floatUp 0.6s forwards; }
@keyframes floatUp { 0%{opacity:1;top:10px} 100%{opacity:0;top:-20px} }
</style>
</head>
<body>
<h1>Whack-a-Mole!</h1>
<div id="hud">
  <div class="stat"><label>SCORE</label><span id="score">0</span></div>
  <div class="stat"><label>TIME</label><span id="timer">30</span></div>
  <div class="stat"><label>BEST</label><span id="best">0</span></div>
</div>
<div id="grid">
  <div class="hole" id="h0"><div class="mole" id="m0"><div class="nose"></div></div><div class="hole-inner"></div></div>
  <div class="hole" id="h1"><div class="mole" id="m1"><div class="nose"></div></div><div class="hole-inner"></div></div>
  <div class="hole" id="h2"><div class="mole" id="m2"><div class="nose"></div></div><div class="hole-inner"></div></div>
  <div class="hole" id="h3"><div class="mole" id="m3"><div class="nose"></div></div><div class="hole-inner"></div></div>
  <div class="hole" id="h4"><div class="mole" id="m4"><div class="nose"></div></div><div class="hole-inner"></div></div>
  <div class="hole" id="h5"><div class="mole" id="m5"><div class="nose"></div></div><div class="hole-inner"></div></div>
  <div class="hole" id="h6"><div class="mole" id="m6"><div class="nose"></div></div><div class="hole-inner"></div></div>
  <div class="hole" id="h7"><div class="mole" id="m7"><div class="nose"></div></div><div class="hole-inner"></div></div>
  <div class="hole" id="h8"><div class="mole" id="m8"><div class="nose"></div></div><div class="hole-inner"></div></div>
</div>
<div id="overlay">
  <h2>Whack-a-Mole!</h2>
  <p>Click the moles before they hide!</p>
  <button onclick="startGame()">START GAME</button>
</div>

<script>
const NUM_HOLES = 9;
let score = 0, best = 0, timeLeft = 30;
let running = false;
let moleTimers = [];
let countdown;
const moles = Array.from({length: NUM_HOLES}, (_, i) => document.getElementById('m' + i));
const scoreEl = document.getElementById('score');
const timerEl = document.getElementById('timer');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function popMole(i) {
  if (!running) return;
  const mole = moles[i];
  if (mole.classList.contains('up') || mole.classList.contains('whacked')) return;
  mole.classList.add('up');
  const upTime = rand(700, 1400);
  moleTimers[i] = setTimeout(() => {
    mole.classList.remove('up', 'whacked');
    scheduleMole(i);
  }, upTime);
}

function scheduleMole(i) {
  if (!running) return;
  const delay = rand(300, 1200);
  moleTimers[i] = setTimeout(() => popMole(i), delay);
}

function whack(e, i) {
  e.stopPropagation();
  if (!running) return;
  const mole = moles[i];
  if (!mole.classList.contains('up') || mole.classList.contains('whacked')) return;
  mole.classList.add('whacked');
  score++;
  scoreEl.textContent = score;
  // hit text
  const txt = document.createElement('div');
  txt.className = 'hit-text';
  txt.textContent = '+1';
  mole.parentElement.appendChild(txt);
  setTimeout(() => txt.remove(), 600);
  clearTimeout(moleTimers[i]);
  setTimeout(() => {
    mole.classList.remove('up', 'whacked');
    scheduleMole(i);
  }, 200);
}

function startGame() {
  overlay.style.display = 'none';
  score = 0; timeLeft = 30;
  scoreEl.textContent = 0;
  timerEl.textContent = 30;
  timerEl.style.color = '#fff';
  running = true;
  // stagger mole starts
  moles.forEach((m, i) => {
    m.classList.remove('up', 'whacked');
    m.onclick = (e) => whack(e, i);
    setTimeout(() => scheduleMole(i), rand(0, 800));
  });
  countdown = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;
    if (timeLeft <= 10) timerEl.style.color = '#ff4444';
    if (timeLeft <= 0) endGame();
  }, 1000);
}

function endGame() {
  running = false;
  clearInterval(countdown);
  moleTimers.forEach(clearTimeout);
  moles.forEach(m => m.classList.remove('up', 'whacked'));
  if (score > best) { best = score; bestEl.textContent = best; }
  const ol = document.getElementById('overlay');
  ol.innerHTML = `<h2>Time's Up!</h2><p>Score: <strong style="color:#ff6b00">${score}</strong> &nbsp; Best: <strong style="color:#ffff00">${best}</strong></p><button onclick="startGame()">PLAY AGAIN</button>`;
  ol.style.display = 'flex';
}
</script>
</body>
</html>
