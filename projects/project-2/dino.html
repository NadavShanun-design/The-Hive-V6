<!DOCTYPE html>
<html>
<head>
<title>Dino Run</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f7f7f7; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
#score { font-size: 24px; color: #333; margin-bottom: 10px; }
canvas { border-bottom: 3px solid #333; background: #f7f7f7; }
#msg { font-size: 18px; color: #555; margin-top: 12px; }
</style>
</head>
<body>
<div id="score">0</div>
<canvas id="c" width="800" height="200"></canvas>
<div id="msg">PRESS SPACE TO START</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');

let dino, cacti, score, speed, frame, gameOver, started, raf;

function init() {
  dino = { x: 80, y: 150, w: 44, h: 50, vy: 0, onGround: true };
  cacti = [];
  score = 0;
  speed = 5;
  frame = 0;
  gameOver = false;
  msgEl.textContent = '';
}

function reset() {
  init();
  started = true;
}

function jump() {
  if (dino.onGround) {
    dino.vy = -14;
    dino.onGround = false;
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!started) { started = true; init(); loop(); return; }
    if (gameOver) { reset(); return; }
    jump();
  }
});

// Touch support
document.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!started) { started = true; init(); loop(); return; }
  if (gameOver) { reset(); return; }
  jump();
});

function drawDino(x, y, w, h, frame) {
  ctx.fillStyle = '#333';
  // Body
  ctx.fillRect(x, y, w, h - 14);
  // Head
  ctx.fillRect(x + w - 20, y - 20, 24, 22);
  // Eye
  ctx.fillStyle = '#f7f7f7';
  ctx.fillRect(x + w - 20 + 14, y - 16, 5, 5);
  ctx.fillStyle = '#333';
  // Mouth / beak
  ctx.fillRect(x + w - 20 + 20, y - 6, 8, 4);
  // Legs (animated)
  const leg = Math.floor(frame / 5) % 2;
  ctx.fillRect(x + 6, y + h - 14, 10, 14 - (leg ? 4 : 0));
  ctx.fillRect(x + 22, y + h - 14, 10, 14 - (leg ? 0 : 4));
}

function drawCactus(cx, cy, cw, ch) {
  ctx.fillStyle = '#2a2';
  // Main stem
  ctx.fillRect(cx + cw/2 - 7, cy, 14, ch);
  // Arms
  ctx.fillRect(cx, cy + ch * 0.3, cw/2 - 7, 10);
  ctx.fillRect(cx, cy + ch * 0.1, 10, ch * 0.3);
  ctx.fillRect(cx + cw/2 + 7, cy + ch * 0.25, cw/2 - 7, 10);
  ctx.fillRect(cx + cw - 10, cy + ch * 0.05, 10, ch * 0.3);
}

function loop() {
  if (gameOver) return;

  frame++;
  score = Math.floor(frame / 6);
  speed = 5 + score / 200;

  // Physics
  dino.vy += 0.7;
  dino.y += dino.vy;
  if (dino.y >= 150) { dino.y = 150; dino.vy = 0; dino.onGround = true; }

  // Spawn cacti
  if (frame % Math.max(60, 120 - score / 5) === 0) {
    const h = 40 + Math.random() * 30;
    cacti.push({ x: 820, y: 200 - h, w: 40, h });
  }

  // Move cacti
  cacti.forEach(ca => ca.x -= speed);
  cacti = cacti.filter(ca => ca.x + ca.w > -10);

  // Collision
  for (const ca of cacti) {
    if (dino.x + 4 < ca.x + ca.w - 4 &&
        dino.x + dino.w - 4 > ca.x + 4 &&
        dino.y + 4 < ca.y + ca.h &&
        dino.y + dino.h > ca.y + 4) {
      gameOver = true;
      msgEl.textContent = 'GAME OVER — SPACE TO RESTART';
      return;
    }
  }

  // Draw
  ctx.clearRect(0, 0, 800, 200);

  // Ground dots
  ctx.fillStyle = '#ccc';
  for (let i = (frame * speed % 30); i < 800; i += 30) ctx.fillRect(i, 198, 15, 2);

  drawDino(dino.x, dino.y, dino.w, dino.h, frame);
  cacti.forEach(ca => drawCactus(ca.x, ca.y, ca.w, ca.h));

  scoreEl.textContent = String(score).padStart(5, '0');

  raf = requestAnimationFrame(loop);
}

// Initial draw
ctx.fillStyle = '#333';
ctx.font = 'bold 28px monospace';
</script>
</body>
</html>
