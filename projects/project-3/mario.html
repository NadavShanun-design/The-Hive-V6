<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mario Platformer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #5c94fc; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; }
canvas { border: 4px solid #000; image-rendering: pixelated; }
#ui { color: white; text-shadow: 2px 2px #000; font-size: 20px; font-weight: bold; margin-bottom: 8px; display: flex; gap: 40px; }
#message { position: absolute; color: white; font-size: 48px; font-weight: bold; text-shadow: 3px 3px #000; display: none; }
</style>
</head>
<body>
<div id="ui">
  <span>SCORE: <span id="score">0</span></span>
  <span>COINS: <span id="coins">0</span></span>
  <span>LIVES: <span id="lives">3</span></span>
</div>
<canvas id="c" width="800" height="480"></canvas>
<div id="message" id="msg"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 480;

const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });

let score = 0, coinCount = 0, lives = 3;
let gameState = 'play'; // play, dead, win, over

// Camera
let camX = 0;

// World width
const WORLD_W = 3200;

// Player
const player = {
  x: 100, y: 300, w: 32, h: 32,
  vx: 0, vy: 0,
  onGround: false,
  dir: 1,
  frame: 0, frameTimer: 0,
  invincible: 0,
  dead: false,
  deadTimer: 0
};

function resetPlayer() {
  player.x = 100; player.y = 300;
  player.vx = 0; player.vy = 0;
  player.onGround = false;
  player.dead = false;
  player.invincible = 60;
}

// Platforms (x, y, w, h)
const platforms = [
  // Ground segments
  {x:0,y:400,w:600,h:80,type:'ground'},
  {x:700,y:400,w:400,h:80,type:'ground'},
  {x:1200,y:400,w:300,h:80,type:'ground'},
  {x:1600,y:400,w:500,h:80,type:'ground'},
  {x:2200,y:400,w:400,h:80,type:'ground'},
  {x:2700,y:400,w:500,h:80,type:'ground'},
  // Floating platforms
  {x:200,y:280,w:120,h:20,type:'brick'},
  {x:400,y:240,w:80,h:20,type:'brick'},
  {x:550,y:300,w:80,h:20,type:'brick'},
  {x:750,y:260,w:120,h:20,type:'brick'},
  {x:900,y:220,w:80,h:20,type:'brick'},
  {x:1050,y:280,w:100,h:20,type:'brick'},
  {x:1250,y:250,w:80,h:20,type:'brick'},
  {x:1400,y:200,w:120,h:20,type:'brick'},
  {x:1650,y:280,w:80,h:20,type:'brick'},
  {x:1800,y:240,w:100,h:20,type:'brick'},
  {x:1950,y:300,w:80,h:20,type:'brick'},
  {x:2050,y:220,w:80,h:20,type:'brick'},
  {x:2250,y:260,w:100,h:20,type:'brick'},
  {x:2450,y:220,w:80,h:20,type:'brick'},
  {x:2600,y:280,w:80,h:20,type:'brick'},
  {x:2800,y:260,w:120,h:20,type:'brick'},
  {x:2950,y:200,w:80,h:20,type:'brick'},
  {x:3050,y:300,w:80,h:20,type:'brick'},
];

// Coins
const coins = [];
function spawnCoins() {
  // On platforms
  const cpos = [
    {x:230,y:250},{x:260,y:250},{x:420,y:210},{x:760,y:230},{x:790,y:230},
    {x:910,y:190},{x:1060,y:250},{x:1090,y:250},{x:1260,y:220},{x:1410,y:170},
    {x:1440,y:170},{x:1660,y:250},{x:1810,y:210},{x:1840,y:210},{x:2060,y:190},
    {x:2260,y:230},{x:2460,y:190},{x:2810,y:230},{x:2840,y:230},{x:2960,y:170},
    // Ground coins
    {x:150,y:360},{x:350,y:360},{x:500,y:360},{x:800,y:360},{x:950,y:360},
    {x:1300,y:360},{x:1700,y:360},{x:1900,y:360},{x:2300,y:360},{x:2500,y:360},
    {x:2750,y:360},{x:2900,y:360},{x:3050,y:360},
  ];
  cpos.forEach(p => coins.push({x:p.x,y:p.y,w:16,h:16,collected:false,anim:0}));
}
spawnCoins();

// Enemies (Goombas)
const enemies = [];
function spawnEnemies() {
  const epos = [
    {x:300,y:368},{x:500,y:368},{x:850,y:368},{x:1050,y:368},
    {x:1350,y:368},{x:1700,y:368},{x:1900,y:368},{x:2100,y:368},
    {x:2300,y:368},{x:2600,y:368},{x:2900,y:368},{x:3000,y:368},
    // Platform enemies
    {x:760,y:228,plat:true},{x:1410,y:168,plat:true},{x:2260,y:228,plat:true},
  ];
  epos.forEach(p => enemies.push({
    x:p.x, y:p.y, w:28, h:28, vx:-1, dead:false, deadTimer:0,
    startX:p.x, range:80, dir:-1, onPlatform:p.plat||false
  }));
}
spawnEnemies();

// Flag (goal)
const flag = { x: 3120, y: 200, w: 30, h: 200, reached: false };

function collides(a, b) {
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function resolveCollisions(obj) {
  obj.onGround = false;
  for (const p of platforms) {
    if (!collides(obj, p)) continue;
    const ox = (obj.x+obj.w/2) - (p.x+p.w/2);
    const oy = (obj.y+obj.h/2) - (p.y+p.h/2);
    const hw = obj.w/2 + p.w/2;
    const hh = obj.h/2 + p.h/2;
    const dx = hw - Math.abs(ox);
    const dy = hh - Math.abs(oy);
    if (dx < dy) {
      obj.x += dx * Math.sign(ox);
      obj.vx = 0;
    } else {
      obj.y += dy * Math.sign(oy);
      if (oy > 0) { obj.vy = 0; } // landing on top
      else { obj.vy = 0; obj.onGround = true; }
    }
  }
  // Recalculate onGround properly
  const feet = {x:obj.x+2, y:obj.y+obj.h, w:obj.w-4, h:2};
  for (const p of platforms) {
    if (collides(feet, p) && obj.vy >= 0) { obj.onGround = true; break; }
  }
}

let lastTime = 0;
function update(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  if (gameState !== 'play') {
    requestAnimationFrame(update);
    return;
  }

  // Player movement
  const SPEED = 3.5;
  const JUMP = -11;
  const GRAVITY = 0.45;

  if (!player.dead) {
    if (keys['ArrowLeft'] || keys['KeyA']) { player.vx = -SPEED; player.dir = -1; }
    else if (keys['ArrowRight'] || keys['KeyD']) { player.vx = SPEED; player.dir = 1; }
    else player.vx *= 0.8;

    if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.onGround) {
      player.vy = JUMP;
      player.onGround = false;
    }

    player.vy += GRAVITY;
    player.x += player.vx;
    player.y += player.vy;

    // World bounds
    if (player.x < 0) player.x = 0;
    if (player.x + player.w > WORLD_W) player.x = WORLD_W - player.w;

    resolveCollisions(player);

    // Fall off screen
    if (player.y > H + 100) {
      die();
    }

    // Animation
    if (Math.abs(player.vx) > 0.5) {
      player.frameTimer++;
      if (player.frameTimer > 8) { player.frame = (player.frame+1)%2; player.frameTimer=0; }
    } else player.frame = 0;

    if (player.invincible > 0) player.invincible--;
  } else {
    player.deadTimer++;
    if (player.deadTimer === 30) player.vy = -10;
    player.vy += 0.5;
    player.y += player.vy;
    if (player.deadTimer > 80) {
      lives--;
      document.getElementById('lives').textContent = lives;
      if (lives <= 0) {
        gameState = 'over';
        showMessage('GAME OVER! Press R to restart');
      } else {
        resetPlayer();
        gameState = 'play';
      }
    }
  }

  // Coins
  coins.forEach(c => {
    if (c.collected) { c.anim = Math.min(c.anim+3, 50); return; }
    c.anim = (c.anim + 0.1) % (Math.PI * 2);
    if (collides(player, c)) {
      c.collected = true;
      coinCount++;
      score += 100;
      document.getElementById('score').textContent = score;
      document.getElementById('coins').textContent = coinCount;
    }
  });

  // Enemies
  enemies.forEach(e => {
    if (e.dead) {
      e.deadTimer++;
      return;
    }
    e.x += e.vx;
    // Patrol
    if (Math.abs(e.x - e.startX) > e.range) {
      e.vx *= -1;
      e.dir = e.vx > 0 ? 1 : -1;
    }
    // Apply gravity to enemies too
    e.vy = (e.vy || 0) + GRAVITY;
    e.y += e.vy;
    // Resolve platform collisions for enemies
    let eOnGround = false;
    const eFeet = {x:e.x+2,y:e.y+e.h,w:e.w-4,h:2};
    for (const p of platforms) {
      if (collides(eFeet,p) && e.vy >= 0) { e.y = p.y - e.h; e.vy = 0; eOnGround = true; break; }
    }
    // Wall collision
    for (const p of platforms) {
      const eSide = {x:e.x,y:e.y+4,w:e.w,h:e.h-8};
      if (collides(eSide,p)) {
        const mid = p.x + p.w/2;
        if (e.x+e.w/2 < mid) { e.x = p.x - e.w; e.vx = Math.abs(e.vx); }
        else { e.x = p.x + p.w; e.vx = -Math.abs(e.vx); }
      }
    }

    if (player.dead || player.invincible > 0) return;
    if (collides(player, e)) {
      // Stomp from above?
      if (player.vy > 0 && player.y + player.h < e.y + e.h/2 + 10) {
        e.dead = true;
        e.deadTimer = 0;
        player.vy = -7;
        score += 200;
        document.getElementById('score').textContent = score;
      } else {
        die();
      }
    }
  });

  // Flag
  if (!flag.reached && collides(player, flag)) {
    flag.reached = true;
    score += 1000;
    document.getElementById('score').textContent = score;
    gameState = 'win';
    showMessage('YOU WIN! 🎉 Press R to play again');
  }

  // Camera
  camX = Math.max(0, Math.min(player.x - W/3, WORLD_W - W));

  requestAnimationFrame(update);
}

function die() {
  if (player.dead || player.invincible > 0) return;
  player.dead = true;
  player.deadTimer = 0;
  player.vy = -8;
  player.vx = 0;
}

function showMessage(txt) {
  const el = document.getElementById('message');
  el.textContent = txt;
  el.style.display = 'block';
}

document.addEventListener('keydown', e => {
  if (e.code === 'KeyR' && (gameState === 'over' || gameState === 'win')) {
    location.reload();
  }
});

// ---- DRAWING ----
function drawRect(x,y,w,h,color) {
  ctx.fillStyle = color;
  ctx.fillRect(x-camX, y, w, h);
}

function drawPlayer() {
  const px = player.x - camX;
  const py = player.y;
  if (player.invincible > 0 && Math.floor(player.invincible/4)%2===0) return;
  const flip = player.dir < 0;
  ctx.save();
  if (flip) { ctx.translate(px + player.w/2, 0); ctx.scale(-1,1); ctx.translate(-player.w/2, 0); }
  else ctx.translate(px, 0);

  // Body
  ctx.fillStyle = '#e00';
  ctx.fillRect(0, py+8, 32, 20);
  // Head
  ctx.fillStyle = '#ffcc99';
  ctx.fillRect(4, py, 24, 16);
  // Hat
  ctx.fillStyle = '#e00';
  ctx.fillRect(2, py-2, 28, 8);
  ctx.fillRect(6, py-8, 20, 8);
  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(18, py+3, 5, 5);
  // Mustache
  ctx.fillStyle = '#a0522d';
  ctx.fillRect(10, py+12, 18, 5);
  // Overalls
  ctx.fillStyle = '#00f';
  ctx.fillRect(2, py+18, 12, 10);
  ctx.fillRect(18, py+18, 12, 10);
  // Legs / running animation
  const legOff = player.frame * 6;
  ctx.fillStyle = '#a0522d';
  ctx.fillRect(2, py+26, 12, 6+legOff%4);
  ctx.fillRect(18, py+26, 12, 6+(legOff+2)%4);
  // Buttons
  ctx.fillStyle = '#ffcc99';
  ctx.fillRect(6, py+20, 4, 4);
  ctx.fillRect(14, py+20, 4, 4);

  ctx.restore();
}

function drawGoomba(e) {
  if (e.dead) {
    if (e.deadTimer < 30) {
      ctx.fillStyle = '#8b4513';
      ctx.fillRect(e.x-camX, e.y+e.h-8, e.w, 8);
    }
    return;
  }
  const ex = e.x - camX;
  const ey = e.y;
  // Body
  ctx.fillStyle = '#8b4513';
  ctx.fillRect(ex, ey+10, e.w, 18);
  // Head
  ctx.fillStyle = '#c67c3a';
  ctx.fillRect(ex+2, ey, e.w-4, 14);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(ex+4, ey+3, 7, 7);
  ctx.fillRect(ex+e.w-11, ey+3, 7, 7);
  ctx.fillStyle = '#000';
  ctx.fillRect(ex+5+(e.vx<0?2:0), ey+4, 4, 4);
  ctx.fillRect(ex+e.w-11+(e.vx<0?2:0), ey+4, 4, 4);
  // Feet
  ctx.fillStyle = '#5a2d0c';
  const foot = Math.floor(Date.now()/200)%2;
  ctx.fillRect(ex, ey+e.h-8, 12, 8);
  ctx.fillRect(ex+e.w-12, ey+e.h-8, 12, 8);
}

function drawPlatform(p) {
  if (p.x+p.w < camX || p.x > camX+W) return;
  if (p.type === 'ground') {
    ctx.fillStyle = '#5a3825';
    ctx.fillRect(p.x-camX, p.y, p.w, p.h);
    ctx.fillStyle = '#4a9c2b';
    ctx.fillRect(p.x-camX, p.y, p.w, 16);
    // Grass tufts
    ctx.fillStyle = '#3a8a1e';
    for (let i=0;i<p.w;i+=32) {
      ctx.fillRect(p.x-camX+i, p.y-4, 12, 6);
      ctx.fillRect(p.x-camX+i+16, p.y-2, 8, 4);
    }
  } else {
    // Brick
    ctx.fillStyle = '#c8602a';
    ctx.fillRect(p.x-camX, p.y, p.w, p.h);
    ctx.fillStyle = '#b05020';
    for (let bx=0;bx<p.w;bx+=20) {
      ctx.fillRect(p.x-camX+bx, p.y, 1, p.h);
    }
    ctx.fillRect(p.x-camX, p.y+p.h/2, p.w, 1);
  }
}

function drawCoin(c) {
  if (c.x-camX < -20 || c.x-camX > W+20) return;
  if (c.collected) return;
  // Spinning coin effect
  const scale = Math.abs(Math.cos(c.anim));
  ctx.save();
  ctx.translate(c.x-camX+c.w/2, c.y+c.h/2);
  ctx.scale(scale, 1);
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(0, 0, c.w/2, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ffaa00';
  ctx.beginPath();
  ctx.arc(0, 0, c.w/4, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawFlag() {
  const fx = flag.x - camX;
  // Pole
  ctx.fillStyle = '#666';
  ctx.fillRect(fx+14, flag.y, 4, flag.h);
  // Ball on top
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(fx+16, flag.y, 8, 0, Math.PI*2);
  ctx.fill();
  // Flag
  ctx.fillStyle = '#0a0';
  ctx.beginPath();
  ctx.moveTo(fx+18, flag.y+5);
  ctx.lineTo(fx+45, flag.y+20);
  ctx.lineTo(fx+18, flag.y+40);
  ctx.fill();
}

function drawBackground() {
  // Sky
  ctx.fillStyle = '#5c94fc';
  ctx.fillRect(0,0,W,H);
  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  const cloudPositions = [100,350,600,900,1200,1500,1800,2200,2600,3000];
  cloudPositions.forEach(cx => {
    const sx = (cx - camX * 0.5) % WORLD_W;
    ctx.fillRect(sx, 80, 80, 30);
    ctx.fillRect(sx+10, 55, 60, 35);
    ctx.fillRect(sx+20, 70, 80, 20);

    ctx.fillRect(sx+200, 120, 60, 25);
    ctx.fillRect(sx+210, 100, 40, 30);
  });
  // Mountains (parallax)
  ctx.fillStyle = '#7eb54e';
  for (let i=0;i<8;i++) {
    const mx = (i*400 - camX*0.3) % (WORLD_W+400);
    ctx.beginPath();
    ctx.moveTo(mx, 400);
    ctx.lineTo(mx+120, 260);
    ctx.lineTo(mx+240, 400);
    ctx.fill();
  }
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawBackground();
  platforms.forEach(drawPlatform);
  drawFlag();
  coins.forEach(drawCoin);
  enemies.forEach(drawGoomba);
  if (!player.dead || player.deadTimer < 60) drawPlayer();
}

function loop(ts) {
  update(ts);
  draw();
  requestAnimationFrame(loop);
}

// Kick off
requestAnimationFrame(ts => { lastTime = ts; loop(ts); });
</script>
</body>
</html>
