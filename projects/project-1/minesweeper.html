<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Minesweeper</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #c0c0c0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Courier New', monospace; }
h1 { font-size: 24px; margin-bottom: 10px; letter-spacing: 2px; }
#controls { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
select, button { padding: 6px 12px; font-size: 14px; cursor: pointer; border: 2px solid #888; background: #d4d0c8; font-family: inherit; }
button:active { border-style: inset; }
#info { display: flex; gap: 20px; margin-bottom: 10px; font-size: 18px; font-weight: bold; background: #000; color: #f00; padding: 6px 14px; border: 2px inset #888; letter-spacing: 2px; }
#board { border: 4px outset #fff; display: inline-block; }
.row { display: flex; }
.cell {
  width: 28px; height: 28px;
  border: 2px outset #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: bold; cursor: pointer;
  user-select: none; background: #c0c0c0;
  transition: background 0.05s;
}
.cell:hover { background: #d4d0c8; }
.cell.revealed {
  border: 1px solid #888; background: #bdbdbd; cursor: default;
}
.cell.revealed:hover { background: #bdbdbd; }
.cell.flagged { background: #c0c0c0; }
.cell.mine-hit { background: red; }
.n1 { color: #0000ff; }
.n2 { color: #008000; }
.n3 { color: #ff0000; }
.n4 { color: #00008b; }
.n5 { color: #8b0000; }
.n6 { color: #008080; }
.n7 { color: #000; }
.n8 { color: #808080; }
#msg { margin-top: 10px; font-size: 20px; font-weight: bold; height: 28px; }
</style>
</head>
<body>
<h1>💣 MINESWEEPER</h1>
<div id="controls">
  <select id="diff">
    <option value="beginner">Beginner (9×9, 10 mines)</option>
    <option value="intermediate" selected>Intermediate (16×16, 40 mines)</option>
    <option value="expert">Expert (30×16, 99 mines)</option>
  </select>
  <button onclick="newGame()">New Game</button>
</div>
<div id="info">
  <span>💣 <span id="mine-count">40</span></span>
  <span>⏱ <span id="timer">000</span></span>
</div>
<div id="board"></div>
<div id="msg"></div>

<script>
const CONFIGS = {
  beginner: { rows: 9, cols: 9, mines: 10 },
  intermediate: { rows: 16, cols: 16, mines: 40 },
  expert: { rows: 16, cols: 30, mines: 99 }
};

let rows, cols, mines, board, revealed, flagged, gameOver, started, timerInterval, firstClick;

function newGame() {
  const cfg = CONFIGS[document.getElementById('diff').value];
  rows = cfg.rows; cols = cfg.cols; mines = cfg.mines;
  board = Array.from({length: rows}, () => Array(cols).fill(0));
  revealed = Array.from({length: rows}, () => Array(cols).fill(false));
  flagged = Array.from({length: rows}, () => Array(cols).fill(false));
  gameOver = false; started = false; firstClick = true;
  clearInterval(timerInterval);
  document.getElementById('timer').textContent = '000';
  document.getElementById('mine-count').textContent = mines;
  document.getElementById('msg').textContent = '';
  render();
}

function placeMines(sr, sc) {
  let placed = 0;
  while (placed < mines) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    if (board[r][c] === -1) continue;
    if (Math.abs(r - sr) <= 1 && Math.abs(c - sc) <= 1) continue;
    board[r][c] = -1;
    placed++;
  }
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (board[r][c] !== -1)
        board[r][c] = countAdj(r, c);
}

function countAdj(r, c) {
  let cnt = 0;
  for (let dr = -1; dr <= 1; dr++)
    for (let dc = -1; dc <= 1; dc++) {
      const nr = r+dr, nc = c+dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && board[nr][nc] === -1) cnt++;
    }
  return cnt;
}

function reveal(r, c) {
  if (r < 0 || r >= rows || c < 0 || c >= cols) return;
  if (revealed[r][c] || flagged[r][c]) return;
  revealed[r][c] = true;
  if (board[r][c] === 0)
    for (let dr = -1; dr <= 1; dr++)
      for (let dc = -1; dc <= 1; dc++)
        if (dr !== 0 || dc !== 0) reveal(r+dr, c+dc);
}

function click(r, c) {
  if (gameOver || revealed[r][c] || flagged[r][c]) return;
  if (firstClick) {
    firstClick = false;
    placeMines(r, c);
    started = true;
    let t = 0;
    timerInterval = setInterval(() => {
      t++; if (t > 999) t = 999;
      document.getElementById('timer').textContent = String(t).padStart(3, '0');
    }, 1000);
  }
  if (board[r][c] === -1) {
    revealed[r][c] = true;
    gameOver = true;
    clearInterval(timerInterval);
    revealAll();
    document.getElementById('msg').textContent = '💥 BOOM! Game Over';
    render();
    return;
  }
  reveal(r, c);
  checkWin();
  render();
}

function flag(r, c) {
  if (gameOver || revealed[r][c]) return;
  flagged[r][c] = !flagged[r][c];
  const cnt = mines - flagged.flat().filter(Boolean).length;
  document.getElementById('mine-count').textContent = cnt;
  render();
}

function revealAll() {
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (board[r][c] === -1) revealed[r][c] = true;
}

function checkWin() {
  let unrevealed = 0;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (!revealed[r][c]) unrevealed++;
  if (unrevealed === mines) {
    gameOver = true;
    clearInterval(timerInterval);
    document.getElementById('msg').textContent = '🎉 You Win!';
  }
}

function render() {
  const b = document.getElementById('board');
  b.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    const row = document.createElement('div');
    row.className = 'row';
    for (let c = 0; c < cols; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const cr = r, cc = c;
      if (revealed[r][c]) {
        cell.classList.add('revealed');
        if (board[r][c] === -1) {
          cell.classList.add('mine-hit');
          cell.textContent = '💣';
        } else if (board[r][c] > 0) {
          cell.textContent = board[r][c];
          cell.classList.add('n' + board[r][c]);
        }
      } else if (flagged[r][c]) {
        cell.classList.add('flagged');
        cell.textContent = '🚩';
      }
      cell.addEventListener('click', () => click(cr, cc));
      cell.addEventListener('contextmenu', e => { e.preventDefault(); flag(cr, cc); });
      row.appendChild(cell);
    }
    b.appendChild(row);
  }
}

newGame();
</script>
</body>
</html>
