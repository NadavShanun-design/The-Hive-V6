<!DOCTYPE html>
<html>
<head>
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; color: #fff; }
#score { font-size: 24px; margin-bottom: 16px; }
canvas { border: 2px solid #444; background: #000; }
#msg { margin-top: 16px; font-size: 16px; color: #888; }
</style>
</head>
<body>
<div id="score">Score: 0</div>
<canvas id="c" width="400" height="400"></canvas>
<div id="msg">Press any arrow key to start</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');
const SIZE = 20, COLS = 20, ROWS = 20;
let snake, dir, next, food, score, running, loop;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0};
  next = {x:1,y:0};
  score = 0;
  running = false;
  scoreEl.textContent = 'Score: 0';
  msgEl.textContent = 'Press any arrow key to start';
  placeFood();
  draw();
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function tick() {
  dir = next;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s=>s.x===head.x&&s.y===head.y)) {
    clearInterval(loop);
    msgEl.textContent = 'Game Over! Press R to restart';
    running = false;
    return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++;
    scoreEl.textContent = 'Score: ' + score;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,400,400);
  ctx.fillStyle = '#f55';
  ctx.fillRect(food.x*SIZE+1, food.y*SIZE+1, SIZE-2, SIZE-2);
  snake.forEach((s,i) => {
    ctx.fillStyle = i===0 ? '#0f0' : '#0a0';
    ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2);
  });
}

document.addEventListener('keydown', e => {
  const keys = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if (keys[e.key]) {
    e.preventDefault();
    const d = keys[e.key];
    if (d.x !== -dir.x || d.y !== -dir.y) next = d;
    if (!running) {
      running = true;
      msgEl.textContent = '';
      loop = setInterval(tick, 120);
    }
  }
  if (e.key==='r'||e.key==='R') { clearInterval(loop); init(); }
});

init();
</script>
</body>
</html>
