<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Helicopter Cave</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
canvas { border: 2px solid #444; display: block; }
#ui { color: #fff; text-align: center; margin-top: 10px; font-size: 14px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">SPACE to fly | dodge the walls</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 800;
canvas.height = 450;

const W = canvas.width, H = canvas.height;

let state = 'start'; // start, playing, dead
let score = 0;
let bestScore = 0;
let frame = 0;

// Helicopter
let heli = { x: 150, y: H / 2, vy: 0 };
const GRAVITY = 0.25;
const LIFT = -0.45;
let spaceDown = false;

// Cave segments
const SEG_W = 8;
let segments = [];
let caveTop = [];
let caveBot = [];
let scrollX = 0;
const SPEED_INIT = 3;
let speed = SPEED_INIT;

// Obstacle
// Cave narrows over time
let caveHeight = 320;
const CAVE_MIN = 100;

function initCave() {
  segments = [];
  scrollX = 0;
  speed = SPEED_INIT;
  caveHeight = 320;
  heli = { x: 150, y: H / 2, vy: 0 };
  score = 0;
  frame = 0;

  // Generate enough segments to fill screen + buffer
  for (let i = 0; i < Math.ceil(W / SEG_W) + 20; i++) {
    addSegment(i === 0);
  }
}

let prevMid = H / 2;
let prevH = 320;

function addSegment(reset) {
  if (reset) {
    prevMid = H / 2;
    prevH = caveHeight;
  }
  // Gently wander the cave center
  let maxShift = 4;
  let mid = prevMid + (Math.random() - 0.5) * maxShift * 2;
  let half = prevH / 2;
  // Keep cave within screen bounds
  mid = Math.max(half + 20, Math.min(H - half - 20, mid));
  segments.push({ top: mid - half, bot: mid + half });
  prevMid = mid;
  prevH = Math.max(prevH - 0.03, CAVE_MIN);
}

initCave();

document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    spaceDown = true;
    if (state === 'start' || state === 'dead') {
      state = 'playing';
      initCave();
    }
  }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space') spaceDown = false;
});
// Touch support
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  spaceDown = true;
  if (state === 'start' || state === 'dead') {
    state = 'playing';
    initCave();
  }
});
canvas.addEventListener('pointerup', () => spaceDown = false);

function update() {
  if (state !== 'playing') return;

  frame++;
  // Increase speed gradually
  speed = SPEED_INIT + frame * 0.002;

  // Scroll
  scrollX += speed;

  // Remove old segments, add new ones
  let segsVisible = Math.ceil(W / SEG_W) + 2;
  let totalSegs = segments.length;
  let firstVisible = Math.floor(scrollX / SEG_W);

  while (segments.length < firstVisible + segsVisible + 20) {
    addSegment(false);
  }

  // Helicopter physics
  if (spaceDown) {
    heli.vy += LIFT;
  }
  heli.vy += GRAVITY;
  heli.vy = Math.max(-8, Math.min(8, heli.vy));
  heli.y += heli.vy;

  // Collision check: sample a few points on helicopter
  let hw = 30, hh = 12;
  let points = [
    { x: heli.x - hw, y: heli.y },
    { x: heli.x + hw, y: heli.y },
    { x: heli.x, y: heli.y - hh },
    { x: heli.x, y: heli.y + hh },
    { x: heli.x + hw, y: heli.y - hh * 0.5 },
    { x: heli.x + hw, y: heli.y + hh * 0.5 },
  ];

  for (let pt of points) {
    let sx = pt.x + scrollX;
    let si = Math.floor(sx / SEG_W);
    let seg = segments[si];
    if (!seg) continue;
    if (pt.y < seg.top || pt.y > seg.bot) {
      state = 'dead';
      if (score > bestScore) bestScore = score;
      return;
    }
  }

  // Screen top/bottom
  if (heli.y < 0 || heli.y > H) {
    state = 'dead';
    if (score > bestScore) bestScore = score;
    return;
  }

  score = Math.floor(frame / 6);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, W, H);

  if (state === 'start') {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('HELICOPTER CAVE', W / 2, H / 2 - 40);
    ctx.font = '20px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Hold SPACE to fly up', W / 2, H / 2 + 10);
    ctx.fillText('Release to fall', W / 2, H / 2 + 40);
    ctx.fillStyle = '#55f';
    ctx.fillText('Press SPACE to start', W / 2, H / 2 + 90);
    return;
  }

  // Draw cave walls
  let firstSeg = Math.floor(scrollX / SEG_W);
  ctx.beginPath();
  // Top wall path
  ctx.moveTo(0, 0);
  for (let i = 0; i < Math.ceil(W / SEG_W) + 2; i++) {
    let si = firstSeg + i;
    let seg = segments[si];
    if (!seg) continue;
    let px = si * SEG_W - scrollX;
    ctx.lineTo(px, seg.top);
  }
  ctx.lineTo(W, 0);
  ctx.closePath();
  ctx.fillStyle = '#2a2a3a';
  ctx.fill();

  // Rock texture top
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < Math.ceil(W / SEG_W) + 2; i++) {
    let si = firstSeg + i;
    let seg = segments[si];
    if (!seg) continue;
    let px = si * SEG_W - scrollX;
    if (i === 0) ctx.moveTo(px, seg.top);
    else ctx.lineTo(px, seg.top);
  }
  ctx.stroke();

  // Bottom wall
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i < Math.ceil(W / SEG_W) + 2; i++) {
    let si = firstSeg + i;
    let seg = segments[si];
    if (!seg) continue;
    let px = si * SEG_W - scrollX;
    ctx.lineTo(px, seg.bot);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = '#2a2a3a';
  ctx.fill();

  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let i = 0; i < Math.ceil(W / SEG_W) + 2; i++) {
    let si = firstSeg + i;
    let seg = segments[si];
    if (!seg) continue;
    let px = si * SEG_W - scrollX;
    if (i === 0) ctx.moveTo(px, seg.bot);
    else ctx.lineTo(px, seg.bot);
  }
  ctx.stroke();

  // Draw helicopter
  let hx = heli.x, hy = heli.y;
  let tilt = Math.max(-0.3, Math.min(0.3, heli.vy * 0.05));

  ctx.save();
  ctx.translate(hx, hy);
  ctx.rotate(tilt);

  // Body
  ctx.fillStyle = '#4af';
  ctx.beginPath();
  ctx.ellipse(0, 0, 30, 12, 0, 0, Math.PI * 2);
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#9ef';
  ctx.beginPath();
  ctx.ellipse(10, -2, 14, 9, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tail
  ctx.fillStyle = '#38a';
  ctx.beginPath();
  ctx.moveTo(-20, 0);
  ctx.lineTo(-38, -8);
  ctx.lineTo(-38, 2);
  ctx.closePath();
  ctx.fill();

  // Tail rotor
  ctx.strokeStyle = '#aef';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-38, -12);
  ctx.lineTo(-38, 6);
  ctx.stroke();

  // Main rotor (spinning)
  let rotAngle = (frame * 0.3) % (Math.PI * 2);
  ctx.strokeStyle = '#cef';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(Math.cos(rotAngle) * 38, -14 + Math.sin(rotAngle) * 4);
  ctx.lineTo(Math.cos(rotAngle + Math.PI) * 38, -14 + Math.sin(rotAngle + Math.PI) * 4);
  ctx.stroke();

  // Rotor mast
  ctx.strokeStyle = '#38a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, -12);
  ctx.lineTo(0, -16);
  ctx.stroke();

  // Skids
  ctx.strokeStyle = '#38a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-15, 10); ctx.lineTo(20, 10);
  ctx.moveTo(-10, 10); ctx.lineTo(-10, 14);
  ctx.moveTo(15, 10); ctx.lineTo(15, 14);
  ctx.moveTo(-15, 14); ctx.lineTo(22, 14);
  ctx.stroke();

  ctx.restore();

  // HUD
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + score, 16, 30);
  ctx.fillStyle = '#aaa';
  ctx.font = '16px monospace';
  ctx.fillText('BEST: ' + bestScore, 16, 52);

  // Speed indicator
  ctx.fillStyle = '#f84';
  ctx.textAlign = 'right';
  ctx.font = '14px monospace';
  ctx.fillText('SPD: ' + speed.toFixed(1), W - 16, 30);

  if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f44';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('CRASHED!', W / 2, H / 2 - 30);
    ctx.fillStyle = '#fff';
    ctx.font = '24px monospace';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + 20);
    ctx.fillStyle = '#55f';
    ctx.font = '18px monospace';
    ctx.fillText('Press SPACE to retry', W / 2, H / 2 + 60);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
