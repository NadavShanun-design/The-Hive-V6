# Cloudflare Pages configuration for THE HIVE

name = "the-hive"
compatibility_date = "2024-01-01"

[build]
command = "echo 'Static site - no build needed'"
cwd = "public"
watch_dirs = ["public"]

[build.upload]
format = "service-worker"

# Pages configuration
pages_build_output_dir = "public"

# Environment variables for Pages
[env.production]
vars = { ENVIRONMENT = "production" }

[env.preview]
vars = { ENVIRONMENT = "preview" }

# Note: The actual terminal server runs locally
# Frontend hosted on Cloudflare Pages connects via WebSocket to local server
# Use Cloudflare Tunnel to expose local server securely
