<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 MOLTBOT Chat - THE HIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0a0a;
            --bg-darker: #050505;
            --neon-green: #00ff41;
            --neon-blue: #00d4ff;
            --neon-pink: #ff006e;
            --neon-yellow: #ffbe0b;
            --border-color: #1a1a1a;
            --text-dim: #666;
            --text-bright: #e0e0e0;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-darker);
            color: var(--text-bright);
            overflow: hidden;
            height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* Cyberpunk grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                linear-gradient(rgba(0, 255, 65, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: var(--bg-dark);
            border-bottom: 2px solid var(--neon-green);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
        }

        .status {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            align-items: center;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            box-shadow: 0 0 5px var(--neon-green);
            animation: pulse 2s infinite;
        }

        .status-dot.disconnected {
            background: var(--neon-pink);
            box-shadow: 0 0 5px var(--neon-pink);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            margin: 1rem;
            border-radius: 8px;
            overflow: hidden;
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .messages-area::-webkit-scrollbar {
            width: 8px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: var(--bg-darker);
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--neon-green);
            border-radius: 4px;
        }

        /* Message Bubble */
        .message {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-header {
            font-size: 0.75rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .message.user .message-header {
            justify-content: flex-end;
        }

        .message-bubble {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-pink));
            color: white;
            border-top-right-radius: 0;
        }

        .message.assistant .message-bubble {
            background: var(--bg-darker);
            border: 1px solid var(--neon-green);
            color: var(--text-bright);
            border-top-left-radius: 0;
        }

        /* Streaming indicator */
        .streaming-message {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--neon-green);
            font-size: 0.85rem;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon-green);
            animation: typing 1.4s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }

        /* Input Area */
        .input-area {
            background: var(--bg-darker);
            border-top: 1px solid var(--neon-green);
            padding: 1rem;
            display: flex;
            gap: 1rem;
        }

        #message-input {
            flex: 1;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            color: var(--text-bright);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            min-height: 48px;
            max-height: 120px;
        }

        #message-input:focus {
            outline: none;
            border-color: var(--neon-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        #send-btn {
            background: linear-gradient(135deg, var(--neon-green), var(--neon-blue));
            border: none;
            color: var(--bg-dark);
            padding: 0.75rem 2rem;
            border-radius: 8px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        #send-btn:hover:not(:disabled) {
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.6);
            transform: translateY(-2px);
        }

        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🦞 MOLTBOT CHAT</div>
            <div class="status">
                <div class="status-item">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="status-text">Connecting...</span>
                </div>
            </div>
        </div>

        <div class="chat-container">
            <div class="messages-area" id="messages-area">
                <!-- Messages will be inserted here -->
            </div>

            <div class="streaming-message" id="streaming-indicator" style="display: none; padding: 1rem;">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span>MOLTBOT is thinking...</span>
            </div>

            <div class="input-area">
                <textarea id="message-input" placeholder="Ask MOLTBOT anything..." rows="1"></textarea>
                <button id="send-btn">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // OpenClaw Gateway Client (simplified version based on openclaw-repo/ui/src/ui/gateway.ts)
        class GatewayClient {
            constructor(url, token) {
                this.url = url;
                this.token = token;
                this.ws = null;
                this.connected = false;
                this.pending = new Map();
                this.connectNonce = null;
                this.connectSent = false;
                this.eventHandlers = [];
                this.sessionKey = 'default';
                this.messages = [];
                this.chatStream = null;
                this.chatRunId = null;
            }

            start() {
                this.connect();
            }

            connect() {
                console.log('[MOLTBOT] Connecting to gateway:', this.url);
                this.ws = new WebSocket(this.url);

                this.ws.onopen = () => {
                    console.log('[MOLTBOT] WebSocket opened');
                    this.queueConnect();
                };

                this.ws.onmessage = (event) => {
                    const frame = JSON.parse(event.data);
                    this.handleMessage(frame);
                };

                this.ws.onclose = (event) => {
                    console.log('[MOLTBOT] WebSocket closed:', event.code, event.reason);
                    this.connected = false;
                    this.updateStatus(false);
                    // Reconnect after 2 seconds
                    setTimeout(() => this.connect(), 2000);
                };

                this.ws.onerror = (error) => {
                    console.error('[MOLTBOT] WebSocket error:', error);
                };
            }

            queueConnect() {
                // Wait 750ms for connect.challenge, then send connect anyway
                setTimeout(() => {
                    if (!this.connectSent) {
                        console.log('[MOLTBOT] No challenge after 750ms, sending connect...');
                        this.sendConnect();
                    }
                }, 750);
            }

            async sendConnect() {
                if (this.connectSent) return;
                this.connectSent = true;

                const params = {
                    minProtocol: 3,
                    maxProtocol: 3,
                    client: {
                        id: 'openclaw-control-ui',
                        version: '1.0.0',
                        platform: navigator.platform,
                        mode: 'ui'
                    },
                    role: 'operator',
                    scopes: ['operator.admin', 'operator.read', 'operator.write'],
                    caps: [],
                    auth: { token: this.token },
                    userAgent: navigator.userAgent,
                    locale: navigator.language
                };

                try {
                    const hello = await this.request('connect', params);
                    console.log('[MOLTBOT] Connected! Hello:', hello);
                    this.connected = true;
                    this.updateStatus(true);
                    // Load chat history
                    await this.loadHistory();
                } catch (err) {
                    console.error('[MOLTBOT] Connect failed:', err);
                    this.ws?.close();
                }
            }

            handleMessage(frame) {
                if (frame.type === 'event') {
                    this.handleEvent(frame);
                } else if (frame.type === 'res') {
                    this.handleResponse(frame);
                }
            }

            handleEvent(evt) {
                console.log('[MOLTBOT] Event:', evt.event, evt.payload);

                if (evt.event === 'connect.challenge') {
                    this.connectNonce = evt.payload?.nonce;
                    this.sendConnect();
                    return;
                }

                if (evt.event === 'chat') {
                    this.handleChatEvent(evt.payload);
                }

                // Call event handlers
                this.eventHandlers.forEach(handler => handler(evt));
            }

            handleChatEvent(payload) {
                if (!payload || payload.sessionKey !== this.sessionKey) return;

                if (payload.state === 'delta') {
                    // Streaming response
                    const text = this.extractText(payload.message);
                    if (text) {
                        this.chatStream = text;
                        this.renderStreaming();
                    }
                } else if (payload.state === 'final') {
                    // Final response - reload history
                    this.chatStream = null;
                    this.chatRunId = null;
                    this.loadHistory();
                }
            }

            handleResponse(res) {
                const pending = this.pending.get(res.id);
                if (pending) {
                    this.pending.delete(res.id);
                    if (res.ok) {
                        pending.resolve(res.payload);
                    } else {
                        pending.reject(new Error(res.error?.message || 'Request failed'));
                    }
                }
            }

            request(method, params) {
                return new Promise((resolve, reject) => {
                    if (!this.ws || this.ws.readyState !== WebSocket.OPEN) {
                        reject(new Error('WebSocket not connected'));
                        return;
                    }

                    const id = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
                    const frame = { type: 'req', id, method, params };

                    this.pending.set(id, { resolve, reject });
                    this.ws.send(JSON.stringify(frame));

                    // Timeout after 30s
                    setTimeout(() => {
                        if (this.pending.has(id)) {
                            this.pending.delete(id);
                            reject(new Error('Request timeout'));
                        }
                    }, 30000);
                });
            }

            async loadHistory() {
                try {
                    const res = await this.request('chat.history', {
                        sessionKey: this.sessionKey,
                        limit: 200
                    });
                    this.messages = res.messages || [];
                    this.renderMessages();
                } catch (err) {
                    console.error('[MOLTBOT] Failed to load history:', err);
                }
            }

            async sendMessage(text) {
                if (!this.connected || !text.trim()) return;

                const message = text.trim();
                const runId = `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
                this.chatRunId = runId;
                this.chatStream = '';

                // Optimistically add user message to UI
                this.messages.push({
                    role: 'user',
                    content: [{ type: 'text', text: message }],
                    timestamp: Date.now()
                });
                this.renderMessages();

                // Show streaming indicator
                document.getElementById('streaming-indicator').style.display = 'flex';

                try {
                    await this.request('chat.send', {
                        sessionKey: this.sessionKey,
                        message: message,
                        deliver: false,
                        idempotencyKey: runId
                    });
                } catch (err) {
                    console.error('[MOLTBOT] Failed to send message:', err);
                    this.messages.push({
                        role: 'assistant',
                        content: [{ type: 'text', text: `Error: ${err.message}` }],
                        timestamp: Date.now()
                    });
                    this.renderMessages();
                    document.getElementById('streaming-indicator').style.display = 'none';
                }
            }

            extractText(message) {
                if (!message) return '';
                if (typeof message === 'string') return message;
                if (Array.isArray(message.content)) {
                    return message.content
                        .filter(block => block.type === 'text')
                        .map(block => block.text)
                        .join('');
                }
                if (message.content && typeof message.content === 'string') {
                    return message.content;
                }
                return '';
            }

            renderMessages() {
                const messagesArea = document.getElementById('messages-area');
                messagesArea.innerHTML = '';

                this.messages.forEach(msg => {
                    const messageEl = document.createElement('div');
                    messageEl.className = `message ${msg.role}`;

                    const headerEl = document.createElement('div');
                    headerEl.className = 'message-header';
                    headerEl.textContent = msg.role === 'user' ? 'You' : 'MOLTBOT';

                    const bubbleEl = document.createElement('div');
                    bubbleEl.className = 'message-bubble';
                    bubbleEl.textContent = this.extractText(msg);

                    messageEl.appendChild(headerEl);
                    messageEl.appendChild(bubbleEl);
                    messagesArea.appendChild(messageEl);
                });

                // Scroll to bottom
                messagesArea.scrollTop = messagesArea.scrollHeight;
            }

            renderStreaming() {
                if (!this.chatStream) return;

                // Find or create streaming message
                let streamingMsg = this.messages.find(m => m.role === 'assistant' && m.streaming);
                if (!streamingMsg) {
                    streamingMsg = {
                        role: 'assistant',
                        content: [{ type: 'text', text: this.chatStream }],
                        streaming: true,
                        timestamp: Date.now()
                    };
                    this.messages.push(streamingMsg);
                } else {
                    streamingMsg.content = [{ type: 'text', text: this.chatStream }];
                }

                this.renderMessages();
            }

            updateStatus(connected) {
                const statusDot = document.getElementById('status-dot');
                const statusText = document.getElementById('status-text');
                const sendBtn = document.getElementById('send-btn');

                if (connected) {
                    statusDot.classList.remove('disconnected');
                    statusText.textContent = 'Connected';
                    sendBtn.disabled = false;
                } else {
                    statusDot.classList.add('disconnected');
                    statusText.textContent = 'Disconnected';
                    sendBtn.disabled = true;
                }
            }

            onEvent(handler) {
                this.eventHandlers.push(handler);
            }
        }

        // Initialize
        const GATEWAY_URL = 'ws://127.0.0.1:18789';
        const GATEWAY_TOKEN = 'local-dev-bypass';

        const client = new GatewayClient(GATEWAY_URL, GATEWAY_TOKEN);
        client.start();

        // UI Event Handlers
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');

        // Auto-resize textarea
        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
        });

        // Send message on button click
        sendBtn.addEventListener('click', async () => {
            const message = messageInput.value;
            if (message.trim()) {
                messageInput.value = '';
                messageInput.style.height = 'auto';
                await client.sendMessage(message);
            }
        });

        // Send message on Enter (Shift+Enter for new line)
        messageInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendBtn.click();
            }
        });

        // Hide streaming indicator when chat finishes
        client.onEvent((evt) => {
            if (evt.event === 'chat' && evt.payload?.state === 'final') {
                document.getElementById('streaming-indicator').style.display = 'none';
            }
        });

        console.log('[MOLTBOT] Chat UI initialized');
    </script>
</body>
</html>
